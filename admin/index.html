<!doctype html>
<html lang="no">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin | Musta Digital</title>
    <meta name="robots" content="noindex, nofollow">
    <meta http-equiv="cache-control" content="no-store">
    <meta http-equiv="pragma" content="no-cache">
    <meta name="theme-color" content="#08172F">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <a class="skip-link" href="#main">Hopp til innhold</a>
    <header class="site-header is-scrolled" data-header>
      <nav class="nav-shell" aria-label="Hovedmeny">
        <a class="brand" href="/" aria-label="Musta Digital hjem">
          <img src="/assets/logo.svg" alt="Musta Digital">
        </a>
        <div class="nav-links admin-nav">
          <a href="/">Forside</a>
          <a href="/personvern/">Personvern</a>
        </div>
      </nav>
    </header>

    <main id="main" class="admin-app">
      <section class="admin-login-screen" data-login-screen>
        <form class="admin-login-card" data-login-form>
          <img src="/assets/favicon.svg" alt="Musta Digital">
          <p class="eyebrow">Musta Digital</p>
          <h1>Logg inn</h1>
          <p>Skriv inn admin-passordet for å åpne kundepanelet.</p>
          <label>
            <span>Passord</span>
            <input name="token" type="password" autocomplete="current-password" placeholder="Admin-passord">
          </label>
          <button class="button primary full" type="submit"><span>Logg inn</span></button>
          <p class="form-status" data-login-status role="status" aria-live="polite"></p>
        </form>
      </section>

      <section class="admin-dashboard" data-dashboard hidden>
        <div class="admin-dashboard-shell">
          <aside class="admin-sidebar" aria-label="Adminmeny">
            <img src="/assets/favicon.svg" alt="Musta Digital">
            <strong>Musta Admin</strong>
            <nav>
              <a href="#" aria-current="page">Alle kunder</a>
              <a href="/personvern/">Personvern</a>
              <a href="/">Nettside</a>
            </nav>
          </aside>

          <div class="admin-content">
            <header class="admin-topbar">
              <div>
                <p class="eyebrow">Kundepanel</p>
                <h1>Alle kunder</h1>
              </div>
              <form class="admin-search" data-search-form>
                <label class="sr-only" for="admin-search">Søk kunder</label>
                <input id="admin-search" name="q" type="search" placeholder="Søk firma, navn, e-post...">
                <button class="button primary" type="submit"><span>Søk</span></button>
              </form>
            </header>

            <section class="admin-stats" aria-label="Oversikt">
              <article>
                <span data-total-count>0</span>
                <p>Totalt</p>
              </article>
              <article>
                <span data-new-count>0</span>
                <p>Nye</p>
              </article>
              <article>
                <span data-customer-count>0</span>
                <p>Kunder</p>
              </article>
            </section>

            <p class="form-status" data-leads-status role="status" aria-live="polite"></p>
            <div class="customer-list" data-leads-results></div>
          </div>
        </div>
      </section>
    </main>

    <script src="/admin/admin.js"></script>
  </body>
</html>
